<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="style/style.css">
</head>



<body class="bg-base-200 min-h-screen flex items-center justify-center">

    <div class="card w-full max-w-sm bg-base-100 shadow-2xl">
        <div class="card-body items-center">
            <img src="assets/github-logo.png">
            <div class="mb-2 ">
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                <p class="text-sm text-center text-base-content/70 mt-1">Sign in to manage your issues</p>
            </div>

            <form id="loginForm" class="w-full">
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="font-bold text-gray-700 mb-2">Username</span>
                    </label>
                    <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full"
                        required />
                </div>

                <div class="form-control mb-4">
                    <label class="label">
                        <span class="font-bold text-gray-700 mb-2">Password</span>
                    </label>
                    <input type="password" id="password" placeholder="Enter Password"
                        class="input input-bordered w-full" required />
                </div>

                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>

            <div class="mt-3 text-center text-sm text-base-content/60">
                <h1 class="font-bold text-gray-900">Or</h1>
                <p class="text-xs mb-4 text-gray-600">Demo Credentials:</p>
                <div class="text-gray-950">
                    <h2><span class="font-bold">Username:</span> admin</h2>
                    <h2><span class="font-bold">Password:</span> admin123</h2>
                </div>
            </div>

            <!-- Error -->
            <p id="errorMsg" class="text-error mt-4 hidden">Invalid Credentials</p>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
