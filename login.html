<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>



<body class="bg-base-200 min-h-screen flex items-center justify-center">

    <div class="card w-full max-w-sm bg-base-100 shadow-xl">
        <div class="card-body items-center text-center">
            <!-- Logo / Title -->
            <div class="mb-6">
                <h1 class="text-4xl font-bold text-primary">Phi Lab</h1>
                <p class="text-lg text-base-content/70 mt-1">Issues Tracker</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="w-full">
                <div class="form-control mb-4">
                    <label class="label">
                        <span class="label-text">Username</span>
                    </label>
                    <input type="text" id="username" placeholder="admin" class="input input-bordered w-full" required />
                </div>

                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" id="password" placeholder="admin123" class="input input-bordered w-full"
                        required />
                </div>

                <button type="submit" class="btn btn-primary w-full">Sign In</button>
            </form>

            <!-- Demo credentials -->
            <div class="mt-6 text-sm text-base-content/60">
                Demo credentials: <br>
                <strong>username:</strong> admin <br>
                <strong>password:</strong> admin123
            </div>

            <!-- Error message -->
            <p id="errorMsg" class="text-error mt-4 hidden">Invalid credentials</p>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
